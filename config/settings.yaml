# Configurações gerais do sistema.
# Alterar aqui sem tocar no código.

camera:
  index: 0              # índice da câmara USB (0=primeira, 1=segunda, ...)
  width: 640
  height: 480
  flip: true                                                         # true para rodar 180° (câmara invertida)
  calibration_path: "calibration/data/lens_calibration.npz"        # deixar vazio para desativar
  perspective_path: ""  # desativado — homografia planar incompatível com mão levantada (parallax)

calibration:
  checkerboard_size: [6, 4]   # cantos internos (colunas, linhas)
  square_size_mm: 35.0         # tamanho real de cada quadrado em milímetros
  min_captures: 15             # capturas mínimas para correr a calibração

detection:
  model_path: "model/hand_landmarker.task"
  max_num_hands: 2
  min_detection_confidence: 0.7
  min_tracking_confidence: 0.7

tracking:
  dwell_time_seconds: 0.5       # tempo mínimo na zona para confirmar tarefa
  task_timeout_seconds: 30.0    # tempo máximo numa tarefa antes de forçar fecho
  stillness_threshold_px: 5.0   # velocidade máxima do pulso (px/frame) para considerar mão parada
                                 # cobre: pausas do operador e falhas de deteção
  zones:                         # zonas físicas únicas da bancada (para desenhar as ROIs)
    - "Porca"
    - "Chassi Inferior"
    - "Rodas"
    - "Chassi Superior"
    - "Parafuso"
    - "Montagem"
    - "Saida"
  two_hands_zones:               # zonas que exigem as duas mãos em simultâneo
    - "Montagem"
  cycle_zone_order:              # ordem esperada das zonas num ciclo completo
                                 # a Zona das Rodas pode aparecer 1 a 4 vezes
                                 # dependendo de quantas rodas o operador traz de cada vez
    - "Porca"
    - "Montagem"
    - "Chassi Inferior"
    - "Montagem"
    - "Rodas"
    - "Montagem"
    - "Chassi Superior"
    - "Montagem"
    - "Parafuso"
    - "Montagem"
    - "Saida"
  exit_zone: "Saida"     # zona cuja conclusão fecha o ciclo
  detection_gap_threshold_s: 1.0  # gap mínimo sem deteção (s) para registar no CSV

dashboard:
  data_path: "dashboard/data/metrics.json"
  refresh_seconds: 1

output:
  excel_output_dir: "output/"
  sessions_subdir: "sessions"
  record_video: true
  video_fps: 10.0
